<!DOCTYPE html>
<html lang="en">
<head>
<title>Create Account | Beo AI Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d0d12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
:root{--gold:#d4a017;--bg:#0d0d12;--surface:#13131a;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);--border-gold:rgba(212,160,23,0.3);--text:#f0ede8;--muted:#777;--danger:#ff5c5c;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:420px}
.auth-card h1{font-family:var(--font-display);font-size:26px;font-weight:800;margin-bottom:8px;letter-spacing:-0.02em}
.auth-card .sub{color:var(--muted);font-size:14px;margin-bottom:16px}
.free-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);color:var(--gold);font-size:12px;font-weight:500;padding:4px 12px;border-radius:100px;margin-bottom:20px}
.google-btn{width:100%;padding:13px;background:#fff;color:#1f1f1f;font-family:var(--font-body);font-size:14px;font-weight:500;border:1px solid rgba(0,0,0,0.12);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;transition:background 0.15s}
.google-btn:hover{background:#f8f8f8}
.google-btn:disabled{opacity:0.6;cursor:not-allowed}
.google-btn svg{width:18px;height:18px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--muted);white-space:nowrap}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-family:var(--font-display);font-weight:700;margin-bottom:7px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:14px;padding:12px 14px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:rgba(212,160,23,0.4)}
.field input::placeholder{color:#333}
.auth-btn{width:100%;padding:14px;background:var(--gold);color:#0d0d12;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:0.06em;border:none;border-radius:8px;cursor:pointer;transition:opacity 0.2s}
.auth-btn:hover:not(:disabled){opacity:0.88}
.auth-btn:disabled{background:#222;color:#444;cursor:not-allowed}
.auth-error{background:rgba(255,92,92,0.07);border:1px solid rgba(255,92,92,0.2);border-radius:8px;color:var(--danger);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.auth-footer{text-align:center;margin-top:22px;font-size:13px;color:var(--muted)}
.auth-footer a{color:var(--gold);text-decoration:none;font-weight:500}
.confirm-screen{display:none;text-align:center;padding:10px 0}
.confirm-icon{font-size:40px;margin-bottom:16px}
.confirm-screen h2{font-family:var(--font-display);font-size:20px;font-weight:800;margin-bottom:10px}
.confirm-screen p{color:var(--muted);font-size:14px;line-height:1.6}
</style>
</head>
<body>
<div id="header"></div>

<div class="auth-wrap">
  <div class="auth-card">

    <div id="signup-form">
      <h1>Create account</h1>
      <p class="sub">Join Beo AI Tools and start creating.</p>
      <div class="free-badge">⚡ 2 free credits on signup</div>

      <!-- Google Sign Up — fastest path -->
      <button class="google-btn" id="google-btn" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or sign up with email</span></div>

      <div class="auth-error" id="signup-error"></div>

      <div class="field">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')signupUser()">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="signup-password" type="password" placeholder="Minimum 6 characters" onkeydown="if(event.key==='Enter')signupUser()">
      </div>

      <button class="auth-btn" id="signup-btn" onclick="signupUser()">Create Account</button>

      <p class="auth-footer">Already have an account? <a href="/login/">Login</a></p>
    </div>

    <div class="confirm-screen" id="signup-confirm">
      <div class="confirm-icon">📬</div>
      <h2>Check your email</h2>
      <p>We sent a confirmation link to your email. Click it to activate your account, then <a href="/login/" style="color:var(--gold)">login here</a>.</p>
    </div>

  </div>
</div>

<div id="footer"></div>
<script>
// Inline wrapper — called immediately when button clicked.
// Delegates to the real function once auth.js module has loaded.
function signInWithGoogle(){
  const btn = document.getElementById("google-btn")
  if(btn){ btn.disabled = true; btn.textContent = "Loading..." }
  // Poll until auth.js module has set window._googleSignIn
  let attempts = 0
  const iv = setInterval(() => {
    attempts++
    if(window._googleSignIn){
      clearInterval(iv)
      window._googleSignIn()
    } else if(attempts > 40){
      clearInterval(iv)
      alert("Please try again — page is still loading.")
      if(btn){ btn.disabled = false; btn.textContent = "Continue with Google" }
    }
  }, 100)
}
</script>
<script type="module" src="/assets/js/app.js"></script>
<script type="module" src="/assets/js/auth.js"></script>
</body>
</html>
