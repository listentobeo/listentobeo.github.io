<!DOCTYPE html>
<html>

<head>

<title>Create Account | Beo AI Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../assets/style.css">

</head>

<body>

<div id="header"></div>

<main class="main">

<section class="container">

<h1 style="text-align:center;margin-bottom:10px;">Create Account</h1>

<p style="text-align:center;color:#bbb;margin-bottom:30px;">
Create an account to start using Beo AI tools.
</p>

<div class="login-box">

<input id="signup-email" type="email" placeholder="Email address">

<input id="signup-password" type="password" placeholder="Password">

<button onclick="signupUser()">Create Account</button>

<p style="margin-top:20px;color:#bbb;">
Already have an account?
<a class="signup-link" href="/login/">Login</a>
</p>

</div>

</section>

</main>

<div id="footer"></div>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>

</body>

</html>
