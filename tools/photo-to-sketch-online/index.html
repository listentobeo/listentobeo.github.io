<!DOCTYPE html>
<html>
<head>

<title>Photo to Sketch Tool</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/assets/style.css">

<style>

.tool-page{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.subtitle{
color:#bbb;
margin-bottom:25px;
}

.upload-box{
border:2px dashed #444;
padding:25px;
border-radius:10px;
margin-bottom:25px;
background:#16161d;
}

.style-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

@media(min-width:700px){
.style-grid{
grid-template-columns:repeat(3,1fr);
}
}

.style-card{
background:#1a1a22;
border:1px solid #333;
padding:14px;
border-radius:8px;
cursor:pointer;
}

.style-card.active{
border:2px solid #d4a017;
}

textarea{
width:100%;
height:80px;
margin-top:10px;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:14px 26px;
margin-top:20px;
background:#d4a017;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#666;
cursor:not-allowed;
}

.preview-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
margin-top:25px;
}

@media(min-width:700px){
.preview-grid{
grid-template-columns:1fr 1fr;
}
}

.preview-box{
background:#1a1a22;
padding:15px;
border-radius:8px;
}

img{
max-width:100%;
border-radius:6px;
}

.credits-badge{
display:inline-block;
background:#1a1a22;
border:1px solid #333;
padding:6px 14px;
border-radius:20px;
font-size:14px;
margin-bottom:20px;
color:#d4a017;
}

.error-msg{
color:#ff6b6b;
margin-top:15px;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="container tool-page">

<h1>Photo to Sketch Tool</h1>

<p class="subtitle">
Turn your photos into pencil drawings, charcoal sketches, anime art and more.
</p>

<!-- CREDITS DISPLAY -->
<div id="credits-display"></div>

<div class="upload-box">
<p>Upload Your Photo</p>
<input type="file" id="upload" accept="image/*">
</div>

<input type="hidden" id="style" value="pencil">

<div class="style-grid">
<div class="style-card active" onclick="selectStyle('pencil',this)">Pencil Drawing</div>
<div class="style-card" onclick="selectStyle('charcoal',this)">Charcoal Sketch</div>
<div class="style-card" onclick="selectStyle('pen',this)">Pen Art</div>
<div class="style-card" onclick="selectStyle('doodle',this)">Doodle Outline</div>
<div class="style-card" onclick="selectStyle('painting',this)">Colored Painting</div>
<div class="style-card" onclick="selectStyle('anime',this)">Anime Art</div>
</div>

<textarea id="prompt" placeholder="Optional: add custom style instructions..."></textarea>

<br>

<button id="generate-btn" onclick="generateSketch()">Generate Sketch</button>

<div id="result"></div>

</div>

<div id="footer"></div>

<!-- app.js sets up supabase on window and loads header/footer -->
<script type="module" src="/assets/js/app.js"></script>

<script>

let uploadedImage = null

const fileInput = document.getElementById("upload")
fileInput.addEventListener("change", previewImage)


/* ── STYLE SELECTOR ── */

window.selectStyle = function(style, el){
  document.getElementById("style").value = style
  document.querySelectorAll(".style-card").forEach(c => c.classList.remove("active"))
  el.classList.add("active")
}


/* ── IMAGE PREVIEW ── */

function previewImage(){
  const file = fileInput.files[0]
  if(!file) return

  const reader = new FileReader()
  reader.onload = function(e){
    uploadedImage = e.target.result
    document.getElementById("result").innerHTML = `
      <div class="preview-grid">
        <div class="preview-box">
          <p>Original Photo</p>
          <img src="${uploadedImage}">
        </div>
      </div>
    `
  }
  reader.readAsDataURL(file)
}


/* ── IMAGE COMPRESSION ──
   Vertex Imagen has a ~1MB base64 input limit.
   Camera/phone photos are often 2-5MB and cause a silent empty {} response.
   We resize + compress to JPEG before sending.
*/

function compressImage(dataUrl, maxWidth = 1024, quality = 0.85){
  return new Promise((resolve) => {
    const img = new Image()
    img.onload = function(){
      let { width, height } = img

      // scale down if wider than maxWidth
      if(width > maxWidth){
        height = Math.round(height * maxWidth / width)
        width = maxWidth
      }

      const canvas = document.createElement("canvas")
      canvas.width  = width
      canvas.height = height
      const ctx = canvas.getContext("2d")
      ctx.drawImage(img, 0, 0, width, height)

      // output as JPEG — much smaller than PNG for photos
      const compressed = canvas.toDataURL("image/jpeg", quality)
      console.log(
        "Image compressed:",
        Math.round(dataUrl.length / 1024) + "KB →",
        Math.round(compressed.length / 1024) + "KB"
      )
      resolve(compressed)
    }
    img.src = dataUrl
  })
}


/* ── LOAD CREDITS ON PAGE READY ── */

async function loadCredits(){
  // wait for app.js module to expose supabase on window
  await waitForSupabase()

  const { data } = await window.supabase.auth.getUser()
  if(!data.user) return

  const { data: profile } = await window.supabase
    .from("profiles")
    .select("credits")
    .eq("id", data.user.id)
    .single()

  if(profile){
    document.getElementById("credits-display").innerHTML = `
      <div class="credits-badge">⚡ ${profile.credits} credits remaining</div>
    `
  }
}

// app.js is a module — it sets window.supabase after it runs
// poll briefly until it's available
function waitForSupabase(){
  return new Promise((resolve) => {
    if(window.supabase) return resolve()
    const interval = setInterval(() => {
      if(window.supabase){
        clearInterval(interval)
        resolve()
      }
    }, 50)
    // give up after 3s
    setTimeout(() => { clearInterval(interval); resolve() }, 3000)
  })
}

// load credits once DOM is ready
document.addEventListener("DOMContentLoaded", loadCredits)


/* ── GENERATE SKETCH ── */

window.generateSketch = async function(){

  await waitForSupabase()

  // 1. Auth check
  const { data: userData } = await window.supabase.auth.getUser()
  if(!userData.user){
    alert("Please login to generate artwork.")
    window.location.href = "/login/"
    return
  }

  // 2. Image check
  if(!uploadedImage){
    alert("Please upload an image first.")
    return
  }

  // 3. Credits check
  const { data: profile } = await window.supabase
    .from("profiles")
    .select("credits")
    .eq("id", userData.user.id)
    .single()

  if(!profile || profile.credits < 1){
    document.getElementById("result").innerHTML = `
      <p class="error-msg">You have no credits left. <a href="/dashboard/">Buy more credits →</a></p>
    `
    return
  }

  // 4. Lock button + show processing state
  const btn = document.getElementById("generate-btn")
  btn.disabled = true
  btn.innerText = "Generating..."

  const style = document.getElementById("style").value
  const prompt = document.getElementById("prompt").value

  document.getElementById("result").innerHTML = `
    <p>Processing with AI...</p>
    <div class="preview-grid">
      <div class="preview-box">
        <p>Original Photo</p>
        <img src="${uploadedImage}">
      </div>
    </div>
  `

  try {

    // 5. Get session token
    const { data: sessionData } = await window.supabase.auth.getSession()

    if(!sessionData.session){
      alert("Session expired. Please login again.")
      window.location.href = "/login/"
      return
    }

    // 6. Compress image before sending (Vertex has ~1MB base64 limit —
    //    raw camera photos are often 2-5MB and cause a silent empty {} response)
    const compressedImage = await compressImage(uploadedImage)

    // 7. Call edge function
    const response = await fetch(
      "https://wphqcccliiwdvwdjgrmc.supabase.co/functions/v1/generate-sketch",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + sessionData.session.access_token
        },
        body: JSON.stringify({
          image: compressedImage,
          style: style,
          prompt: prompt
        })
      }
    )

    const result = await response.json()

    // 7. Check for error in response
    if(!result.result){
      throw new Error(result.error || "No image returned from AI.")
    }

    // 8. Deduct credit
    await window.supabase
      .from("profiles")
      .update({ credits: profile.credits - 1 })
      .eq("id", userData.user.id)

    // 9. Show result — both original AND generated side by side
    document.getElementById("result").innerHTML = `
      <h3>Result</h3>
      <div class="preview-grid">
        <div class="preview-box">
          <p>Original</p>
          <img src="${uploadedImage}">
        </div>
        <div class="preview-box">
          <p>Generated Art</p>
          <img src="${result.result}">
        </div>
      </div>
    `

    // 10. Update credits badge
    document.getElementById("credits-display").innerHTML = `
      <div class="credits-badge">⚡ ${profile.credits - 1} credits remaining</div>
    `

  } catch(err) {
    document.getElementById("result").innerHTML = `
      <p class="error-msg">Something went wrong: ${err.message}</p>
    `
  } finally {
    btn.disabled = false
    btn.innerText = "Generate Sketch"
  }

}

</script>

</body>
</html>
