<!DOCTYPE html>
<html>
<head>

<title>Photo to Sketch Tool</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/assets/style.css">

</head>
<style>

.tool-page{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.subtitle{
color:#bbb;
margin-bottom:25px;
}

.upload-box{
border:2px dashed #444;
padding:25px;
border-radius:10px;
margin-bottom:25px;
background:#16161d;
}

.style-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

@media(min-width:700px){
.style-grid{
grid-template-columns:repeat(3,1fr);
}
}

.style-card{
background:#1a1a22;
border:1px solid #333;
padding:14px;
border-radius:8px;
cursor:pointer;
}

.style-card.active{
border:2px solid #d4a017;
}

textarea{
width:100%;
height:80px;
margin-top:10px;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:14px 26px;
margin-top:20px;
background:#d4a017;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.preview-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
margin-top:25px;
}

@media(min-width:700px){
.preview-grid{
grid-template-columns:1fr 1fr;
}
}

.preview-box{
background:#1a1a22;
padding:15px;
border-radius:8px;
}

img{
max-width:100%;
border-radius:6px;
}

</style>

</head>

<body>
<div id="header"></div>
<div class="container tool-page">

<h1>Photo to Sketch Tool</h1>
<p class="subtitle">
Turn your photos into pencil drawings, charcoal sketches, anime art and more.
</p>

<div class="upload-box">
<p>Upload Your Photo</p>
<input type="file" id="upload">
</div>

<input type="hidden" id="style" value="pencil">

<div class="style-grid">

<div class="style-card active" onclick="selectStyle('pencil',this)">Pencil Drawing</div>
<div class="style-card" onclick="selectStyle('charcoal',this)">Charcoal Sketch</div>
<div class="style-card" onclick="selectStyle('pen',this)">Pen Art</div>
<div class="style-card" onclick="selectStyle('doodle',this)">Doodle Outline</div>
<div class="style-card" onclick="selectStyle('painting',this)">Colored Painting</div>
<div class="style-card" onclick="selectStyle('anime',this)">Anime Art</div>

</div>

<textarea id="prompt" placeholder="Optional: add custom style instructions..."></textarea>

<br>

<button onclick="generateSketch()">Generate Sketch</button>

<div id="result"></div>

</div>

<script>

let uploadedImage = null

const fileInput = document.getElementById("upload")

fileInput.addEventListener("change", previewImage)

function selectStyle(style,el){

document.getElementById("style").value = style

document.querySelectorAll(".style-card").forEach(card=>{
card.classList.remove("active")
})

el.classList.add("active")

}

function previewImage(){

const file = fileInput.files[0]
if(!file) return

const reader = new FileReader()

reader.onload = function(e){

uploadedImage = e.target.result

document.getElementById("result").innerHTML = `
<h3>Preview</h3>

<div class="preview-grid">

<div class="preview-box">
<p>Original Photo</p>
<img src="${uploadedImage}">
</div>

</div>
`

}

reader.readAsDataURL(file)

}
async function generateSketch(){

const user = await getUser()

if(!user){
alert("Login to generate sketches")
return
}

const credits = await checkCredits(user.id)

if(credits <= 0){
alert("You need credits to generate images")
return
}

/* run AI generation here */

  }
  
/*IMAGE CHECK*/

if(!uploadedImage){
alert("Please upload an image")
return
}

const style = document.getElementById("style").value
const prompt = document.getElementById("prompt").value

document.getElementById("result").innerHTML = `
<p>Processing with AI...</p>

<div class="preview-grid">
<div class="preview-box">
<p>Original Photo</p>
<img src="${uploadedImage}">
</div>
</div>
`

const response = await fetch(
"https://wphqcccliiwdvwdjgrmc.supabase.co/functions/v1/generate-sketch",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":"sb_publishable_-VkVZ5mPWa3EPEqHCmE3dw_UvOZBiXo",
"Authorization":"Bearer sb_publishable_-VkVZ5mPWa3EPEqHCmE3dw_UvOZBiXo"
},
body: JSON.stringify({
image: uploadedImage,
style: style,
prompt: prompt
})
})

const data = await response.json()

document.getElementById("result").innerHTML = `
<h3>Result</h3>

<div class="preview-grid">

<div class="preview-box">
<p>Original</p>
<img src="${uploadedImage}">
</div>

<div class="preview-box">
<p>Generated Art</p>
<img src="${data.result}">
</div>

</div>
`

}

</script>
  
<div id="footer"></div>
<script type="module" src="/assets/js/app.js"></script>
</body>
</html>
