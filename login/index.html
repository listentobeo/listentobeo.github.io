<!DOCTYPE html>
<html>

<head>

<title>Login | Beo AI Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/assets/style.css">

</head>

<body>

<div id="header"></div>

<main class="main">

<section class="container">

<h1 style="text-align:center;margin-bottom:10px;">Login</h1>

<p style="text-align:center;color:#bbb;margin-bottom:30px;">
Login to access AI tools and manage your credits.
</p>

<div class="login-box">

<input id="email" type="email" placeholder="Email address">

<input id="password" type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<p style="margin-top:20px;color:#bbb;">
Don't have an account?
<a href="/signup" onclick="signupUser()">Create one</a>
</p>

</div>

</section>

</main>

<div id="footer"></div>

<script src="/assets/js/app.js"></script>
<script type="module" src="../assets/js/auth.js"></script>

</body>

</html>
