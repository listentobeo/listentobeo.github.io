<!DOCTYPE html>
<html>
<head>

<title>Beo AI Tools</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#0c0c12;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#111;
}

.logo{
height:40px;
}

.menu-btn{
font-size:26px;
cursor:pointer;
}

/* MENU */

.menu{
display:none;
background:#111;
padding:20px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:12px 0;
}

/* HERO */

.hero{
text-align:center;
padding:50px 20px;
}

.hero h1{
font-size:32px;
margin-bottom:10px;
}

.hero p{
color:#bbb;
}

/* TOOLS */

.tools{
max-width:600px;
margin:auto;
padding:20px;
}

.tool{
background:#1a1a22;
padding:20px;
margin:15px 0;
border-radius:10px;
text-align:center;
text-decoration:none;
display:block;
color:white;
border:1px solid #333;
}

.tool:hover{
border-color:#d4a017;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="/logo.png" class="logo">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

</div>

<!-- MENU -->

<div class="menu" id="menu">

<a href="/">Home</a>

<a href="/tools/photo-to-sketch/">Photo to Sketch</a>

<a href="#">How it Works</a>

<a href="https://www.beoarts.com">Back to BeoArts</a>

</div>

<!-- HERO -->

<div class="hero">

<h1>Beo AI Tools</h1>

<p>Create sketches, paintings, and AI artwork from your photos.</p>

</div>

<!-- TOOLS -->

<div class="tools">

<a class="tool" href="/tools/photo-to-sketch/">
Photo to Sketch Tool
</a>

</div>

<script>

function toggleMenu(){

const menu = document.getElementById("menu")

menu.style.display = menu.style.display === "block"
? "none"
: "block"

}

</script>

</body>
</html>
