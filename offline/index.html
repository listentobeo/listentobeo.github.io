<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d0d12">
<title>You're Offline | Beo AI Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/assets/style.css">
<style>
:root{--gold:#d4a017;--bg:#0d0d12;--surface:#13131a;--border:rgba(255,255,255,0.07);--muted:#666;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#f0ede8;font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:400px}
.icon{width:64px;height:64px;border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;background:var(--surface)}
.icon svg{width:28px;height:28px;stroke:var(--gold);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:10px}
p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:28px}
a{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#0d0d12;font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:12px 22px;border-radius:8px;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">
    <svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
  </div>
  <h1>You're offline</h1>
  <p>Beo AI Tools needs an internet connection to generate artwork. Connect to the internet and try again.</p>
  <a href="/" onclick="window.location.reload()">
    Try Again
  </a>
</div>
</body>
</html>
