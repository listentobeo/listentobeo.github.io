<!DOCTYPE html>
<html lang="en">
<head>
<title>Client Proposal | Beo AI Tools</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#d4a017;--ink:#17171d;--muted:#6d6b68;--paper:#f7f6f2;--line:#dedbd4;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif}*{box-sizing:border-box}body{margin:0;background:#e9e7e1;color:var(--ink);font-family:var(--body)}
.proposal{width:min(980px,calc(100% - 28px));margin:30px auto;background:var(--paper);box-shadow:0 16px 50px rgba(20,20,25,.12)}.proposal-inner{padding:clamp(24px,6vw,66px)}
.brand{display:flex;align-items:center;justify-content:space-between;gap:20px;padding-bottom:24px;border-bottom:1px solid var(--line)}.brand-mark{display:flex;align-items:center;gap:10px;font:700 13px var(--display)}.brand-mark img{width:34px;height:34px;border-radius:6px;object-fit:contain}.proposal-status{font:700 10px var(--display);text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted)}
.hero{padding:58px 0 40px}.eyebrow{font:700 10px var(--display);text-transform:uppercase;color:var(--accent);margin-bottom:14px}.hero h1{font:800 clamp(30px,7vw,58px) var(--display);line-height:1.03;margin:0 0 13px;max-width:800px}.hero .client{font-size:16px;color:var(--muted)}
.visuals{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:0 0 50px}.visuals img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}.visuals img:first-child:nth-last-child(1){grid-column:1/-1;aspect-ratio:16/9}
.details{border-top:1px solid var(--line)}.detail{display:grid;grid-template-columns:200px 1fr;gap:28px;padding:25px 0;border-bottom:1px solid var(--line)}.detail h2{font:700 11px var(--display);text-transform:uppercase;color:var(--muted);margin:2px 0}.detail p{white-space:pre-wrap;margin:0;font-size:15px;line-height:1.75}.contact{display:flex;justify-content:space-between;gap:20px;padding:38px 0 8px}.contact strong{font:700 14px var(--display)}.contact a{color:var(--ink)}
.review{background:#111117;color:#f0ede8;padding:clamp(24px,5vw,46px);margin-top:26px}.review h2{font:800 25px var(--display);margin:0 0 8px}.review>p{color:#aaa39a;font-size:14px;margin:0 0 23px}.review-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}.review input,.review textarea{width:100%;background:#1a1a22;border:1px solid rgba(255,255,255,.1);border-radius:7px;color:#f0ede8;padding:12px;font:14px var(--body)}.review textarea{grid-column:1/-1;min-height:100px;resize:vertical}.review-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.review button,.print-btn{min-height:42px;padding:10px 16px;border-radius:7px;font:700 12px var(--display);cursor:pointer}.approve{background:var(--accent);border:1px solid var(--accent);color:#0d0d12}.changes,.comment,.print-btn{background:transparent;border:1px solid rgba(255,255,255,.16);color:#f0ede8}.print-btn{position:fixed;right:20px;bottom:20px;background:#111117;z-index:5}.feedback{margin-top:28px;border-top:1px solid rgba(255,255,255,.1)}.feedback-item{padding:15px 0;border-bottom:1px solid rgba(255,255,255,.1)}.feedback-item strong{font:700 12px var(--display)}.feedback-item span{font-size:10px;text-transform:uppercase;color:var(--accent);margin-left:8px}.feedback-item p{font-size:13px;color:#c4c0b9;margin:6px 0 0;line-height:1.55}.loading{padding:100px 20px;text-align:center;color:var(--muted)}.error{max-width:480px;margin:80px auto;text-align:center;padding:30px}.error h1{font:800 25px var(--display)}
.beo-footer{display:flex;align-items:center;justify-content:center;gap:8px;color:#8c8983;font-size:11px;padding:28px}.beo-footer img{width:22px;height:22px;border-radius:4px}
@media(max-width:650px){.proposal{width:100%;margin:0}.detail{grid-template-columns:1fr;gap:8px}.visuals{grid-template-columns:1fr}.review-fields{grid-template-columns:1fr}.review textarea{grid-column:auto}.contact{flex-direction:column}.print-btn{right:12px;bottom:12px}}@media print{body{background:white}.proposal{width:100%;margin:0;box-shadow:none}.review,.print-btn{display:none}.proposal-inner{padding:35px}.beo-footer{padding-bottom:0}}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading proposal...</div></div>
<button class="print-btn" onclick="window.print()" style="display:none" id="print-btn">Print / Save PDF</button>
<script src="/assets/js/analytics.js"></script>
<script>
;(function(){
 var API="https://wphqcccliiwdvwdjgrmc.supabase.co/functions/v1/referral-credit",data=null
 function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}
 function block(label,value){if(!value)return"";return'<section class="detail"><h2>'+esc(label)+'</h2><p>'+esc(value)+'</p></section>'}
 function load(){var token=new URLSearchParams(window.location.search).get("token")||"";if(!/^[a-f0-9]{48}$/i.test(token)){fail();return}
  request("proposal_get",{token:token}).then(function(result){data=result;render(token);if(window.BeoAnalytics)window.BeoAnalytics.track("proposal_viewed")}).catch(fail)}
 function request(action,payload){payload.action=action;return fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}).then(function(r){return r.json().catch(function(){return{}}).then(function(body){if(!r.ok)throw new Error(body.error||"Request failed");return body})})}
 function render(token){var p=data.project,pr=data.proposal,images="",feedback="",brand=""
  for(var i=0;i<data.images.length;i++)images+='<img src="'+esc(data.images[i].image_url)+'" alt="Project concept">'
  for(var j=0;j<data.feedback.length;j++){var f=data.feedback[j];feedback+='<div class="feedback-item"><strong>'+esc(f.author_name)+'</strong><span>'+esc(f.action.replace(/_/g," "))+'</span><p>'+esc(f.message)+'</p></div>'}
  if(data.branding==="custom"&&pr.logo_url)brand='<img src="'+esc(pr.logo_url)+'" alt="Studio logo"><span>'+esc(pr.contact_name||"Creative studio")+'</span>'
  else brand='<img src="/assets/icon-192.png" alt="Beo AI Tools"><span>Beo AI Tools</span>'
  document.documentElement.style.setProperty("--accent",/^#[0-9a-f]{6}$/i.test(pr.accent_color||"")?pr.accent_color:"#d4a017")
  var html='<article class="proposal"><div class="proposal-inner"><header class="brand"><div class="brand-mark">'+brand+'</div><span class="proposal-status">'+esc(pr.status.replace(/_/g," "))+'</span></header>'
  html+='<section class="hero"><div class="eyebrow">'+esc(p.project_type.replace(/_/g," "))+' proposal</div><h1>'+esc(p.title)+'</h1><div class="client">'+esc(p.client_name?"Prepared for "+p.client_name:"Client proposal")+'</div></section>'
  if(images)html+='<section class="visuals">'+images+'</section>'
  html+='<div class="details">'+block("Project summary",pr.summary)+block("Scope of work",pr.scope)+block("Location",p.location)+block("Dimensions",p.dimensions_text)+block("Timeline",pr.timeline)+block("Investment",pr.price_text)+block("Revisions",pr.revision_terms)+block("Notes and terms",pr.notes)+'</div>'
  if(pr.contact_name||pr.contact_email)html+='<div class="contact"><strong>'+esc(pr.contact_name||"Project contact")+'</strong>'+(pr.contact_email?'<a href="mailto:'+esc(pr.contact_email)+'">'+esc(pr.contact_email)+'</a>':"")+'</div>'
  html+='</div><section class="review"><h2>Review this proposal</h2><p>Approve the direction or leave a clear note for the artist.</p><div class="review-fields"><input id="review-name" maxlength="120" placeholder="Your name"><input id="review-email" type="email" placeholder="Email (not stored)"><textarea id="review-message" maxlength="2000" placeholder="Feedback or requested changes"></textarea></div><div class="review-actions"><button class="approve" onclick="respondToProposal(\'proposal_approve\')">Approve proposal</button><button class="changes" onclick="respondToProposal(\'proposal_changes\')">Request changes</button><button class="comment" onclick="respondToProposal(\'proposal_comment\')">Leave comment</button></div><div class="feedback" id="feedback-list">'+feedback+'</div></section>'
  if(data.branding!=="custom")html+='<footer class="beo-footer"><img src="/assets/icon-192.png" alt="">Proposal powered by Beo AI Tools</footer>'
  html+='</article>';document.getElementById("app").innerHTML=html;document.getElementById("print-btn").style.display="block";window._proposalToken=token}
 window.respondToProposal=function(action){var name=document.getElementById("review-name").value.trim(),message=document.getElementById("review-message").value.trim();if(!name){alert("Please enter your name.");return}if(action!=="proposal_approve"&&!message){alert("Please add a note.");return}
  var buttons=document.querySelectorAll(".review button");for(var i=0;i<buttons.length;i++)buttons[i].disabled=true
  request(action,{token:window._proposalToken,authorName:name,message:message}).then(function(result){if(window.BeoAnalytics)window.BeoAnalytics.track(result.status==="approved"?"proposal_approved":"proposal_feedback_sent",{action:result.status});alert(result.status==="approved"?"Proposal approved. The artist will see your response.":"Your response has been sent.");load()}).catch(function(e){alert(e.message||"Could not send your response.");for(var j=0;j<buttons.length;j++)buttons[j].disabled=false})}
 function fail(){document.getElementById("app").innerHTML='<div class="error"><img src="/assets/icon-192.png" width="42" height="42" alt=""><h1>Proposal not available</h1><p>This link may be incomplete or the proposal has not been shared yet.</p></div>'}
 if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",load);else load()
})()
</script>
</body>
</html>
